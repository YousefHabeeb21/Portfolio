        <div class="carousel-controls">
            <button class="carousel-button" data-direction="prev">&#10094;</button>
<button class="carousel-button" data-direction="next">&#10095;</button>

        </div>
    </div>




<script>


document.addEventListener('DOMContentLoaded', function() {
    let currentSlideIndex = 0;
    const slides = document.querySelectorAll('.carousel-slide');
    
    function changeSlide(newIndex) {
        if (currentSlideIndex !== newIndex) {
            const currentSlide = slides[currentSlideIndex];
            const newSlide = slides[newIndex];

            // Apply outgoing animation to current slide
            currentSlide.style.animation = 'slideOutLeftFadeOut 0.5s forwards';

            // Prepare new slide off-screen and make visible
            newSlide.style.visibility = 'visible';
            newSlide.style.opacity = '1';

            // Apply incoming animation to new slide after a short delay to allow the outgoing animation to start
            setTimeout(() => {
                newSlide.style.animation = 'slideInRightFadeIn 0.5s forwards';
            }, 100); // Adjust timing as necessary

            // Update the index after the animation completes
            setTimeout(() => {
                currentSlide.classList.remove('active');
                currentSlide.style.visibility = 'hidden';
                currentSlide.style.opacity = '0';
                currentSlide.style.animation = '';
                newSlide.classList.add('active');
                currentSlideIndex = newIndex;
            }, 500); // This should match the longest animation duration
        }
    }

    // Navigation button handlers
    document.querySelector('[data-direction="prev"]').addEventListener('click', () => changeSlide((currentSlideIndex - 1 + slides.length) % slides.length));
    document.querySelector('[data-direction="next"]').addEventListener('click', () => changeSlide((currentSlideIndex + 1) % slides.length));

    // Initialize
    slides[0].classList.add('active');
    slides[0].style.visibility = 'visible';
    slides[0].style.opacity = '1';
});


    </script>
