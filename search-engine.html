    <div class="carousel-container">
        <div class="carousel-slide active" id="slide1">
            <img src="Assets/Build-SE.png" alt="Code Image 1" style="width:100%;">
            <p>Description for image 1</p>
        </div>
        <div class="carousel-slide" id="slide2">
            <img src="Assets/SE-run.png" alt="Code Image 2" style="width:100%;">
            <p>Description for image 2</p>
        </div>
        <div class="carousel-slide" id="slide3">
            <img src="Assets/Query-SE.png" alt="Code Image 3" style="width:100%;">
            <p>Description for image 3</p>
        </div>
        <div class="carousel-controls">
            <button class="carousel-button" onclick="moveSlide(-1)">&#10094;</button>
            <button class="carousel-button" onclick="moveSlide(1)">&#10095;</button>
        </div>
    </div>

    <script>


        let currentSlide = 1;
        const slides = document.getElementsByClassName('carousel-slide');
        const carouselContainer = document.querySelector('.carousel-container');

        function showSlide(number) {
            if (number > slides.length) {
                currentSlide = 1;
            } else if (number < 1) {
                currentSlide = slides.length;
            } else {
                currentSlide = number;
            }

            Array.from(slides).forEach(slide => slide.style.display = 'none'); // Hide all slides
            slides[currentSlide - 1].style.display = 'block'; // Show the current slide

            carouselContainer.scrollIntoView({
                behavior: 'smooth',
                block: 'center'
            });
        }

        function moveSlide(step) {
            
            const nextSlide = currentSlide + step;
            if (nextSlide > slides.length) {
                return;
            } else if (nextSlide < 1) {
                return;
            }
            showSlide(nextSlide);
        }
        const prevButton = document.querySelector('.carousel-button-prev'); 
        const nextButton = document.querySelector('.carousel-button-next'); 

        prevButton.addEventListener('click', function () {
            moveSlide(-1);
        });

        nextButton.addEventListener('click', function () {
            moveSlide(1);
        });
        document.addEventListener('DOMContentLoaded', () => showSlide(currentSlide));

    </script>





</body>

</html>
