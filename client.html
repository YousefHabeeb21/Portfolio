    <div class="carousel-container">
        <div class="carousel-slide" id="slide1">
            <img src="Assets/server.png" alt="Code Image 1" class="carousel-image">
            <button class="info-button" data-description="Welcome to the server-side functionality of a multi-client chat application. Here, a ServerSocket is instantiated to listen for incoming client connections on a specified port. The server operates within an infinite loop, continuously accepting new clients. For each connection, a new ClientThread is initiated, and unique client identifiers are assigned, illustrating my ability to manage concurrent network connections. Exception handling ensures robustness, logging an appropriate message if the server socket fails to launch. This piece exemplifies my competence with Java sockets and multithreaded programming, forming the backbone of real-time client-server communication."><i class="material-icons">info</i>
            </button>
        </div>
        <div class="carousel-slide" id="slide2">
            <img src="Assets/clientC.png" alt="Code Image 2" class="carousel-image">
            <button class="info-button" data-description="What you see now is from the client controller class, featuring methods crucial for user interaction within a JavaFX GUI. The initialize method establishes a connection with the server using a Client object and sets up a thread-safe way to update the GUI with incoming messages using Platform.runLater. The send method processes user input, creating a combined message string that includes both the message and the intended recipient(s), which is then dispatched to the server. This demonstrates my skill in crafting responsive GUI applications with JavaFX and implementing clean, user-driven event handling."><i class="material-icons">info</i>
            </button>
        </div>
        <div class="carousel-slide" id="slide3">
            <img src="Assets/guiserver.png" alt="Code Image 3" class="carousel-image">
            <button class="info-button" data-description="This excerpt from the GUI server controller demonstrates the initialization of the application's main window, where users choose to launch either the server or client interface. Utilizing JavaFX's FXMLLoader, it dynamically loads the respective FXML and CSS files for the selected module. Styling properties are applied to the buttons, and event handlers are set up to switch scenes upon user interaction. This reflects my ability to design and implement a user-friendly interface that allows for seamless navigation between different parts of the application."><i class="material-icons">info</i>
            </button>
        </div>

        <div class="carousel-slide" id="slide4">
            <img src="Assets/client run.png" alt="Code Image 4" class="carousel-image">
            <button class="info-button" data-description="What you see now is the user interface of the chat application, providing a clear and intuitive design for message exchange and client management. The message input field, recipient specification area, and current client list showcase a practical layout for user interaction. The displayed messages demonstrate the application's real-time communication capability, with notifications for new client connections and direct messaging between clients. This GUI captures my focus on user experience design, implementing a clean and functional aesthetic for easy navigation and use."><i class="material-icons">info</i>
            </button>
        </div>
